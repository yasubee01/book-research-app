<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KDP爆速リサーチツール（最終安定版）</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
        :root {
            --bg: #0f172a; --bg2: #1e293b; --bg3: #334155;
            --text: #f8fafc; --text2: #94a3b8;
            --amber: #fbbf24; --rakuten: #ff4d4d; --amazon: #ff9900;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 10px; border: none; border-radius: 8px; background: var(--bg2); color: var(--text2); cursor: pointer; font-size: 14px; }
        .tab.active { background: var(--amber); color: #000; font-weight: bold; }
        .page { display: none; }
        .page.active { display: block; }
        input { width: 100%; padding: 15px; border-radius: 8px; border: 1px solid var(--bg3); background: var(--bg2); color: #fff; margin-bottom: 10px; font-size: 16px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; background: var(--amber); color: #000; font-size: 16px; }
        .book-card { background: var(--bg2); border-radius: 12px; padding: 20px; margin-top: 15px; border-left: 5px solid var(--amber); }
        .actions { display: flex; gap: 10px; margin-top: 15px; }
        .link-btn { flex: 1; text-align: center; padding: 12px; border-radius: 6px; text-decoration: none; font-size: 14px; font-weight: bold; color: #fff; }
        .link-amz { background: var(--amazon); }
        .link-rak { background: var(--rakuten); }
    </style>
</head>
<body>
<div class="container">
    <div class="tabs">
        <button class="tab active" onclick="showPage('research')">🔍 市場リサーチ</button>
        <button class="tab" onclick="showPage('settings')">⚙️ 設定</button>
    </div>

    <div id="research" class="page active">
        <input type="text" id="keyword" placeholder="例：オナ禁、人妻、筋トレ">
        <button class="btn" onclick="doResearch()">リサーチ開始</button>
        <div id="results"></div>
    </div>

    <div id="settings" class="page">
        <h3 style="margin-bottom:10px;">API設定</h3>
        <p style="font-size:12px; color:var(--text2); margin-bottom:10px;">新しいAPIキーを貼り付けて保存してください。</p>
        <input type="password" id="api-key" placeholder="sk-ant-...">
        <button class="btn" onclick="saveSettings()">設定を保存</button>
    </div>
</div>

<script>
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function saveSettings() {
        const key = document.getElementById('api-key').value.trim();
        localStorage.setItem('kdp_key_final', key);
        alert('設定を保存しました！');
        showPage('research');
    }

    window.onload = () => {
        const savedKey = localStorage.getItem('kdp_key_final');
        if (savedKey) document.getElementById('api-key').value = savedKey;
    };

    async function doResearch() {
        const key = localStorage.getItem('kdp_key_final');
        const kw = document.getElementById('keyword').value;
        const resDiv = document.getElementById('results');
        if (!key) return alert('設定タブでキーを保存してください');
        
        resDiv.innerHTML = '<p style="text-align:center; padding:20px;">AI分析中...</p>';
        
        try {
            const response = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                    'x-api-key': key,
                    'anthropic-version': '2023-06-01',
                    'content-type': 'application/json',
                    'anthropic-dangerous-direct-browser-access': 'true'
                },
                body: JSON.stringify({
                    model: 'claude-3-haiku-20240307',
                    max_tokens: 1000,
                    messages: [{ role: 'user', content: `${kw}のジャンルの電子書籍を5冊、JSON形式[{"title":"本題","insight":"分析"}]で教えて` }]
                })
            });
            const data = await response.json();
            if (data.error) throw new Error(data.error.message);

            const text = data.content[0].text;
            const books = JSON.parse(text.match(/\[.*\]/s)[0]);
            
            resDiv.innerHTML = '';
            books.forEach(b => {
                resDiv.innerHTML += `
                    <div class="book-card">
                        <strong>${b.title}</strong><br><small>${b.insight}</small>
                        <div class="actions">
                            <a href="https://www.amazon.co.jp/s?k=${encodeURIComponent(b.title)}" target="_blank" class="link-btn link-amz">Amazon</a>
                            <a href="https://search.rakuten.co.jp/search/mall/${encodeURIComponent(b.title)}" target="_blank" class="link-btn link-rak">楽天</a>
                        </div>
                    </div>`;
            });
        } catch (e) {
            resDiv.innerHTML = '<p style="color:#ff4d4d; padding:20px;">エラー：キーが無効化された可能性があります。新しいキーを「設定」で入れ直してください。</p>';
        }
    }
</script>
</body>
</html>
