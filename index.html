<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KDP爆速リサーチツール（安定稼働版）</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
        :root {
            --bg: #0f172a; --bg2: #1e293b; --bg3: #334155;
            --text: #f8fafc; --text2: #94a3b8;
            --amber: #fbbf24; --rakuten: #ff4d4d; --amazon: #ff9900;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 12px; border: none; border-radius: 8px; background: var(--bg2); color: var(--text2); cursor: pointer; font-weight: bold; }
        .tab.active { background: var(--amber); color: #000; }
        .page { display: none; }
        .page.active { display: block; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--bg3); background: var(--bg2); color: #fff; margin-bottom: 10px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-main { background: var(--amber); color: #000; }
        .book-card { background: var(--bg2); border-radius: 12px; padding: 20px; margin-bottom: 15px; border-left: 5px solid var(--amber); }
        .actions { display: flex; gap: 10px; margin-top: 15px; }
        .link-btn { flex: 1; text-align: center; padding: 10px; border-radius: 6px; text-decoration: none; font-size: 12px; font-weight: bold; color: #fff; }
        .link-amz { background: var(--amazon); }
        .link-rak { background: var(--rakuten); }
        .output-area { background: var(--bg3); padding: 15px; border-radius: 8px; white-space: pre-wrap; font-size: 14px; }
    </style>
</head>
<body>
<div class="container">
    <div class="tabs">
        <button class="tab active" onclick="showPage('research')">🔍 市場リサーチ</button>
        <button class="tab" onclick="showPage('settings')">⚙️ 設定</button>
    </div>
    <div id="research" class="page active">
        <input type="text" id="keyword" placeholder="キーワードを入力（例：オナ禁）">
        <button class="btn btn-main" onclick="doResearch()">リサーチ開始</button>
        <div id="results"></div>
    </div>
    <div id="settings" class="page">
        <h3>初期設定</h3>
        <input type="password" id="api-key" placeholder="Claude APIキー（sk-ant-...）を入力">
        <button class="btn btn-main" onclick="saveSettings()">設定を保存</button>
    </div>
</div>

<script>
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }
    function saveSettings() {
        localStorage.setItem('kdp_key', document.getElementById('api-key').value);
        alert('保存完了！');
    }
    window.onload = () => {
        document.getElementById('api-key').value = localStorage.getItem('kdp_key') || '';
    };

    async function doResearch() {
        const key = localStorage.getItem('kdp_key');
        const kw = document.getElementById('keyword').value;
        const resDiv = document.getElementById('results');
        if (!key) return alert('先に設定でキーを保存してください');
        
        resDiv.innerHTML = '分析中...';
        
        try {
            const response = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                    'x-api-key': key,
                    'anthropic-version': '2023-06-01',
                    'content-type': 'application/json',
                    'anthropic-dangerous-direct-browser-access': 'true' // これが重要！
                },
                body: JSON.stringify({
                    model: 'claude-3-haiku-20240307',
                    max_tokens: 1000,
                    messages: [{ role: 'user', content: `${kw}のジャンルの電子書籍を5冊、JSON形式[{"title":"本題","insight":"分析"}]で教えて` }]
                })
            });
            const data = await response.json();
            const books = JSON.parse(data.content[0].text.match(/\[.*\]/s)[0]);
            
            resDiv.innerHTML = '';
            books.forEach(b => {
                resDiv.innerHTML += `
                    <div class="book-card">
                        <strong>${b.title}</strong><br><small>${b.insight}</small>
                        <div class="actions">
                            <a href="https://www.amazon.co.jp/s?k=${encodeURIComponent(b.title)}" target="_blank" class="link-btn link-amz">Amazon</a>
                            <a href="https://search.rakuten.co.jp/search/mall/${encodeURIComponent(b.title)}" target="_blank" class="link-btn link-rak">楽天</a>
                        </div>
                    </div>`;
            });
        } catch (e) {
            resDiv.innerHTML = 'エラー：APIキーの残高不足か、形式ミスが考えられます。';
        }
    }
</script>
</body>
</html>
