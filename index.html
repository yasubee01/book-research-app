<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KDP爆速リサーチツール（Amazon・楽天直結版）</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
        :root {
            --bg: #0f172a; --bg2: #1e293b; --bg3: #334155;
            --text: #f8fafc; --text2: #94a3b8;
            --amber: #fbbf24; --blue: #38bdf8; --rakuten: #ff4d4d; --amazon: #ff9900;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        
        /* 簡易ナビ */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 12px; border: none; border-radius: 8px; background: var(--bg2); color: var(--text2); cursor: pointer; font-weight: bold; }
        .tab.active { background: var(--amber); color: #000; }

        .page { display: none; }
        .page.active { display: block; }

        /* 入力エリア */
        input, textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--bg3); background: var(--bg2); color: #fff; margin-bottom: 10px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-main { background: var(--amber); color: #000; }
        .btn:hover { opacity: 0.8; }

        /* カードデザイン */
        .book-card { background: var(--bg2); border-radius: 12px; padding: 20px; margin-bottom: 15px; border-left: 5px solid var(--amber); }
        .book-title { font-size: 18px; font-weight: bold; margin-bottom: 5px; }
        .book-meta { font-size: 13px; color: var(--text2); margin-bottom: 10px; }
        .actions { display: flex; gap: 10px; margin-top: 15px; }
        .link-btn { flex: 1; text-align: center; padding: 10px; border-radius: 6px; text-decoration: none; font-size: 12px; font-weight: bold; color: #fff; }
        .link-amz { background: var(--amazon); }
        .link-rak { background: var(--rakuten); }

        .loading { text-align: center; padding: 40px; color: var(--amber); }
        .output-area { background: var(--bg3); padding: 15px; border-radius: 8px; white-space: pre-wrap; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab active" onclick="showPage('research')">🔍 市場リサーチ</button>
        <button class="tab" onclick="showPage('kdp')">📝 KDP構成案</button>
        <button class="tab" onclick="showPage('settings')">⚙️ 設定</button>
    </div>

    <div id="research" class="page active">
        <input type="text" id="keyword" placeholder="リサーチしたいキーワードを入力（例：40代 恋愛 禁欲）">
        <button class="btn btn-main" onclick="doResearch()">リサーチ開始</button>
        <div id="results"></div>
    </div>

    <div id="kdp" class="page">
        <input type="text" id="kdp-theme" placeholder="テーマを入力（例：初心者向け筋トレ術）">
        <button class="btn btn-main" onclick="generateKDP()">構成案・目次を作成</button>
        <div id="kdp-results" style="margin-top:20px;"></div>
    </div>

    <div id="settings" class="page">
        <h3>初期設定</h3>
        <p style="font-size:12px; color:var(--text2); margin-bottom:15px;">Claude APIキーを入力してください。アフィリエイトIDは不要です。</p>
        <input type="password" id="api-key" placeholder="sk-ant-...">
        <button class="btn btn-main" onclick="saveSettings()">設定を保存</button>
    </div>
</div>

<script>
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function saveSettings() {
        const key = document.getElementById('api-key').value;
        localStorage.setItem('kdp_claude_key', key);
        alert('設定を保存しました。');
    }

    window.onload = () => {
        const savedKey = localStorage.getItem('kdp_claude_key');
        if (savedKey) document.getElementById('api-key').value = savedKey;
    };

    async function callClaude(prompt) {
        const key = localStorage.getItem('kdp_claude_key');
        if (!key) { alert('設定タブからAPIキーを入力してください。'); return; }

        const response = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'x-api-key': key,
                'anthropic-version': '2023-06-01',
                'anthropic-dangerous-direct-browser-access': 'true'
            },
            body: JSON.stringify({
                model: 'claude-3-haiku-20240307',
                max_tokens: 1500,
                messages: [{ role: 'user', content: prompt }]
            })
        });
        const data = await response.json();
        return data.content[0].text;
    }

    async function doResearch() {
        const kw = document.getElementById('keyword').value;
        if (!kw) return;
        const resDiv = document.getElementById('results');
        resDiv.innerHTML = '<div class="loading">AIが市場を分析中...</div>';

        const prompt = `${kw}のジャンルでKDP出版を検討しています。参考になる既存の書籍を5冊、JSON形式（title, author, insight）でリストアップしてください。`;
        
        try {
            const text = await callClaude(prompt);
            const jsonStr = text.match(/\[.*\]/s)[0];
            const books = JSON.parse(jsonStr);

            resDiv.innerHTML = '';
            books.forEach(book => {
                const amzUrl = `https://www.amazon.co.jp/s?k=${encodeURIComponent(book.title)}`;
                const rakUrl = `https://search.rakuten.co.jp/search/mall/${encodeURIComponent(book.title)}`;
                
                resDiv.innerHTML += `
                    <div class="book-card">
                        <div class="book-title">${book.title}</div>
                        <div class="book-meta">著者: ${book.author}</div>
                        <p style="font-size:13px;">分析: ${book.insight}</p>
                        <div class="actions">
                            <a href="${amzUrl}" target="_blank" class="link-btn link-amz">Amazonで調査</a>
                            <a href="${rakUrl}" target="_blank" class="link-btn link-rak">楽天で調査</a>
                        </div>
                    </div>
                `;
            });
        } catch (e) {
            resDiv.innerHTML = '<p>エラーが発生しました。APIキーを確認してください。</p>';
        }
    }

    async function generateKDP() {
        const theme = document.getElementById('kdp-theme').value;
        if (!theme) return;
        const resDiv = document.getElementById('kdp-results');
        resDiv.innerHTML = '<div class="loading">爆速で構成案を作成中...</div>';

        const prompt = `テーマ「${theme}」でKDP出版するための、読者を惹きつけるタイトル5案と、詳細な目次案（第1章〜第5章）を作成してください。`;
        
        try {
            const text = await callClaude(prompt);
            resDiv.innerHTML = `<div class="output-area">${text}</div>`;
        } catch (e) {
            resDiv.innerHTML = '<p>エラーが発生しました。</p>';
        }
    }
</script>
</body>
</html>
