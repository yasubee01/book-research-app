<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KDP爆速リサーチ・プロ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
        :root {
            --bg: #0f172a; --card: #1e293b; --accent: #fbbf24;
            --text: #f8fafc; --text-dim: #94a3b8;
        }
        body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 12px; border: none; border-radius: 8px; background: var(--card); color: var(--text-dim); cursor: pointer; }
        .tab.active { background: var(--accent); color: #000; font-weight: bold; }
        .page { display: none; }
        .page.active { display: block; }
        input { width: 100%; padding: 15px; border-radius: 8px; border: 1px solid #334155; background: var(--card); color: #fff; margin-bottom: 15px; font-size: 16px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; background: var(--accent); color: #000; }
        .book-card { background: var(--card); border-radius: 15px; padding: 20px; margin-top: 20px; border-top: 4px solid var(--accent); }
        .tag { display: inline-block; background: #334155; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin-bottom: 10px; }
        .book-title { font-size: 20px; font-weight: bold; margin-bottom: 10px; color: var(--accent); }
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 13px; margin-top: 15px; }
        .detail-item { background: #0f172a; padding: 10px; border-radius: 6px; }
        .label { color: var(--accent); font-weight: bold; display: block; margin-bottom: 4px; }
        .actions { margin-top: 20px; display: flex; gap: 10px; }
        .link-btn { flex: 1; text-align: center; padding: 12px; border-radius: 8px; text-decoration: none; font-weight: bold; color: #fff; background: #ff9900; }
    </style>
</head>
<body>
<div class="container">
    <div class="tabs">
        <button class="tab active" onclick="showPage('main')">🔍 爆速リサーチ</button>
        <button class="tab" onclick="showPage('set')">⚙️ 設定</button>
    </div>

    <div id="main" class="page active">
        <input type="text" id="kw" placeholder="リサーチしたいキーワードを入力">
        <button class="btn" onclick="startResearch()">リサーチ開始</button>
        <div id="res"></div>
    </div>

    <div id="set" class="page">
        <h3>APIキー設定</h3>
        <input type="password" id="key" placeholder="sk-ant-...">
        <button class="btn" onclick="saveKey()">保存する</button>
    </div>
</div>

<script>
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }
    function saveKey() {
        localStorage.setItem('kdp_pro_key', document.getElementById('key').value.trim());
        alert('保存しました！');
        showPage('main');
    }
    window.onload = () => { document.getElementById('key').value = localStorage.getItem('kdp_pro_key') || ''; };

    async function startResearch() {
        const key = localStorage.getItem('kdp_pro_key');
        const kw = document.getElementById('kw').value;
        const resDiv = document.getElementById('res');
        if(!key) return alert('先に設定でキーを保存してください');
        
        resDiv.innerHTML = '<p style="text-align:center;">AIが実在する本を徹底リサーチ中...</p>';
        
        const prompt = `${kw}に関連するAmazon/Kindleの本を5冊リサーチして、以下のJSON形式で出力してください。
        [{"title":"タイトル","hook":"1行フック","target":"ターゲット","diff":"差別化ポイント","summary":"内容要点"}]`;

        try {
            const response = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: { 'x-api-key': key, 'anthropic-version': '2023-06-01', 'content-type': 'application/json', 'anthropic-dangerous-direct-browser-access': 'true' },
                body: JSON.stringify({ model: 'claude-3-haiku-20240307', max_tokens: 2000, messages: [{ role: 'user', content: prompt }] })
            });
            const data = await response.json();
            const books = JSON.parse(data.content[0].text.match(/\[.*\]/s)[0]);
            
            resDiv.innerHTML = '';
            books.forEach(b => {
                resDiv.innerHTML += `
                <div class="book-card">
                    <div class="tag">実在書籍リサーチ結果</div>
                    <div class="book-title">${b.title}</div>
                    <div style="font-size:14px; border-bottom:1px solid #334155; padding-bottom:10px;">${b.hook}</div>
                    <div class="detail-grid">
                        <div class="detail-item"><span class="label">ターゲット</span>${b.target}</div>
                        <div class="detail-item"><span class="label">差別化</span>${b.diff}</div>
                    </div>
                    <div class="detail-item" style="margin-top:10px;"><span class="label">要点</span>${b.summary}</div>
                    <div class="actions">
                        <a href="https://www.amazon.co.jp/s?k=${encodeURIComponent(b.title)}" target="_blank" class="link-btn">Amazonで実物をチェック ↗</a>
                    </div>
                </div>`;
            });
        } catch (e) {
            resDiv.innerHTML = '<p style="color:red;">通信エラー。新しいAPIキーを設定し直してください。</p>';
        }
    }
</script>
</body>
</html>
