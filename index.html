<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>KDP楽天リサーチツール</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 20px; line-height: 1.6; }
        .config { background: #f4f4f4; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        input { width: 100%; padding: 8px; margin: 5px 0 15px; border: 1px solid #ccc; }
        button { background: #bf0000; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
        button:hover { background: #a00000; }
        .result-card { border: 1px solid #ddd; padding: 15px; margin-top: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .affiliate-btn { background: #007bff; color: white; text-decoration: none; padding: 8px 12px; border-radius: 4px; font-size: 14px; }
    </style>
</head>
<body>

    <h2>📚 KDP楽天リサーチツール</h2>
    
    <div class="config">
        <strong>設定（LocalStorageに保存されます）</strong>
        <label>もしも a_id: <input type="text" id="a_id" value="5537036"></label>
        <label>もしも s_id: <input type="text" id="s_id" placeholder="ソースコードから抜き出したs_idを入力"></label>
        <button onclick="saveConfig()">設定を保存</button>
    </div>

    <div class="search-section">
        <label>リサーチしたいキーワード:</label>
        <input type="text" id="keyword" placeholder="例：江戸時代 雑学">
        <button onclick="generateLinks()">楽天ブックスでリンク生成</button>
    </div>

    <div id="results"></div>

    <script>
        // 設定の保存
        function saveConfig() {
            localStorage.setItem('moshimo_a_id', document.getElementById('a_id').value);
            localStorage.setItem('moshimo_s_id', document.getElementById('s_id').value);
            alert("設定を保存しました！");
        }

        // ページ読み込み時に設定を復元
        window.onload = function() {
            if(localStorage.getItem('moshimo_a_id')) document.getElementById('a_id').value = localStorage.getItem('moshimo_a_id');
            if(localStorage.getItem('moshimo_s_id')) document.getElementById('s_id').value = localStorage.getItem('moshimo_s_id');
        }

        // リンク生成ロジック
        function generateLinks() {
            const keyword = document.getElementById('keyword').value;
            const a_id = localStorage.getItem('moshimo_a_id');
            const s_id = localStorage.getItem('moshimo_s_id');

            if (!keyword || !s_id) {
                alert("キーワードとs_idを入力してください");
                return;
            }

            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = "<h3>リサーチ結果</h3>";

            // 本来はここをAIがやりますが、今回は単体動作のため直接リンクを生成
            const encodedKeyword = encodeURIComponent(keyword);
            
            // 楽天用URL合成（p_id=54, pc_id=54）
            const affiliateUrl = `https://af.moshimo.com/af/c/click?a_id=${a_id}&p_id=54&pc_id=54&s_id=${s_id}&url=https%3A%2F%2Fsearch.rakuten.co.jp%2Fsearch%2Fmall%2F${encodedKeyword}`;

            const card = `
                <div class="result-card">
                    <div>
                        <strong>キーワード: ${keyword}</strong><br>
                        <small>楽天ブックスの検索結果へ飛びます</small>
                    </div>
                    <a href="${affiliateUrl}" target="_blank" class="affiliate-btn">楽天で市場調査</a>
                </div>
            `;
            resultsDiv.innerHTML += card;
        }
    </script>
</body>
</html>
